<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorie Tracker - LetMeFit</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .delete-btn {
      color: #f44336;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      transition: var(--transition);
    }
    .delete-btn:hover {
      color: #d32f2f;
      transform: scale(1.1);
    }
    .meal-list {
      margin-top: 1.5rem;
    }
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    #goal-edit-container {
      display: none;
      background-color: var(--light-bg);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border-color);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="index.html"><i class="fas fa-leaf"></i> LetMeFit</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="calorie-tracker.html" class="active">Calorie Tracker</a></li>
      <li><a href="fitness-tracker.html">Fitness Tracker</a></li>
    </ul>
    <div class="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
  </nav>

  <main class="container">
    <h2>Calorie Tracker</h2>
    <p>Log your meals and track your caloric intake against your personal daily goal.</p>
    
    <div class="card" style="margin-top: 1.5rem;">
      <div class="goal-header">
        <div class="summary-bar" style="width: 100%; margin-bottom: 0px;">
          <span>Total Calories Today: <span id="total-calories">0</span> kcal</span>
          <span>Goal: <span id="calorie-goal-display">2000</span> kcal 
            <button id="edit-goal-btn" class="btn btn-outline" title="Edit Goal" style="padding: 0.2rem 0.6rem; font-size: 0.8rem; margin-left: 0.5rem;">
              <i class="fas fa-edit"></i>
            </button>
          </span>
        </div>
      </div>
      
      <div id="goal-edit-container">
        <label for="new-goal" style="font-weight: 500; font-size: 0.95rem; display: block; margin-bottom: 0.5rem;">Set New Daily Calorie Goal:</label>
        <div style="display: flex; gap: 0.5rem;">
          <input type="number" id="new-goal" style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; flex-grow: 1;" min="100">
          <button id="save-goal-btn" class="btn" style="padding: 0.5rem 1.5rem;">Save</button>
        </div>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="calorie-progress"></div>
      </div>
    </div>
    
    <div class="tracker-grid">
      <div class="card">
        <h3>Add Meal</h3>
        <form id="calorie-form" style="margin-top: 1.5rem;">
          <div class="form-group">
            <label for="food-name">Meal Name</label>
            <input type="text" id="food-name" placeholder="e.g. Oatmeal with berries" required>
          </div>
          <div class="form-group">
            <label for="calories">Calories</label>
            <input type="number" id="calories" placeholder="e.g. 350" required min="1">
          </div>
          <div class="form-group">
            <label for="meal-type">Meal Type</label>
            <select id="meal-type" required>
              <option value="Breakfast">Breakfast</option>
              <option value="Lunch">Lunch</option>
              <option value="Dinner">Dinner</option>
              <option value="Snack">Snack</option>
            </select>
          </div>
          <button type="submit" class="btn" style="width: 100%;">Add Food</button>
        </form>
      </div>

      <div class="card">
        <h3>Today's Log</h3>
        <div class="list-container">
          <div class="meal-list" id="meal-list">
            <!-- Meal items will be injected here by JS -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calorie.js"></script>
</body>
</html>
