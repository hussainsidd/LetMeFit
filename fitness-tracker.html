<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Tracker - LetMeFit</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .delete-btn {
      color: #f44336;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      transition: var(--transition);
    }
    .delete-btn:hover {
      color: #d32f2f;
      transform: scale(1.1);
    }
    .activity-list {
      margin-top: 1.5rem;
    }
    .total-burned {
      font-weight: 700;
      font-size: 1.2rem;
      text-align: right;
      padding-top: 1rem;
      margin-top: 1rem;
      border-top: 2px solid var(--border-color);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="index.html"><i class="fas fa-leaf"></i> LetMeFit</a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="calorie-tracker.html">Calorie Tracker</a></li>
      <li><a href="fitness-tracker.html" class="active">Fitness Tracker</a></li>
    </ul>
    <div class="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
  </nav>

  <main class="container">
    <h2>Fitness Tracker</h2>
    <p>Log your workouts and automatically estimate calories burned based on standard MET values.</p>
    
    <div class="tracker-grid">
      <div class="card">
        <h3>Log Workout</h3>
        <form id="fitness-form" style="margin-top: 1.5rem;" novalidate>
          <div id="fitness-error" class="error-message"></div>
          <div class="form-group">
            <label for="workout-name">Activity Name</label>
            <input type="text" id="workout-name" placeholder="e.g. Morning Jog">
          </div>
          <div class="form-group">
            <label for="activity-type">Activity Type</label>
            <select id="activity-type">
              <option value="Walking">Walking</option>
              <option value="Running">Running</option>
              <option value="Cycling">Cycling</option>
              <option value="Gym">Gym</option>
              <option value="Swimming">Swimming</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="duration">Duration (minutes)</label>
            <input type="number" id="duration" placeholder="e.g. 30" min="1">
          </div>
          <button type="submit" class="btn" style="width: 100%;">Add Activity</button>
        </form>
      </div>

      <div class="card">
        <h3>Today's Activities</h3>
        <div class="list-container">
          <div class="activity-list" id="activity-list">
            <!-- Activity items will be injected here by JS -->
          </div>
        </div>
        <div class="total-burned">
          Total Calories Burned: <span id="total-burned" style="color: #ff5722;">0</span> kcal
        </div>
      </div>
    </div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/fitness.js"></script>
</body>
</html>
